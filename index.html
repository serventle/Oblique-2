<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE | Digital Underground Media</title>
    
    <!-- Подключаем Tailwind, React и Babel для работы прямо в браузере -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: white; 
            color: black; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Текстура шума */
        .grain { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 99; 
            opacity: 0.05; 
            background-image: url('https://grainy-gradients.vercel.app/noise.svg'); 
        }
        
        /* Эффект проявления цвета при наведении */
        .img-reveal { 
            filter: grayscale(100%); 
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .img-reveal:hover { 
            filter: grayscale(0%); 
            transform: scale(1.02); 
        }
        
        /* Анимация бегущей строки */
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; animation: marquee 30s linear infinite; }
        
        /* Скроллбар */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Вшитые иконки для стабильной работы
        const Icon = ({ name, size = 20, className = "" }) => {
            const props = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className };
            switch(name) {
                case "Menu": return <svg {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
                case "X": return <svg {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
                case "ArrowRight": return <svg {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
                case "ArrowLeft": return <svg {...props}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
                case "ShoppingCart": return <svg {...props}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
                case "Instagram": return <svg {...props}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>;
                case "Facebook": return <svg {...props}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>;
                default: return null;
            }
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedArticleId, setSelectedArticleId] = useState(null);
            const [cartCount, setCartCount] = useState(0);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const articles = [
                {
                    id: 1,
                    title: "COLOSSUS: БЫВШИЙ ДОМ ПЕЧАТИ",
                    category: "МЕСТА",
                    tags: ["TECHNO", "INDUSTRY"],
                    image: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800",
                    description: "Пространство, которое не заигрывает с посетителем. Оно подавляет масштабом."
                },
                {
                    id: 2,
                    title: "TULPAN BERLIN: ГЛЯНЕЦ И КРАСНЫЙ ДЫМ",
                    category: "МЕСТА",
                    tags: ["STUDIO", "RAVE"],
                    image: "https://images.unsplash.com/photo-1574169208507-84376144848b?auto=format&fit=crop&q=80&w=800",
                    description: "Днем — стерильный бокс для Bazaar. Ночью — вибрирующий резервуар ВИХОД."
                },
                {
                    id: 3,
                    title: "БАРИБАЕВА: ГОД ПОСЛЕ ВЫСЕЛЕНИЯ",
                    category: "КУЛЬТУРА",
                    tags: ["COMMUNITY", "ALMATY"],
                    image: "https://images.unsplash.com/photo-1514306191717-452ec28c7814?auto=format&fit=crop&q=80&w=800",
                    description: "Творческое ядро города переместилось на сорок шагов в сторону."
                }
            ];

            const shopItems = [
                { id: 'print-01', title: "OBLIQUE ISSUE #0.1", price: "5000 ₸", image: "https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&q=80&w=800", type: "PRINT" },
                { id: 'tee-01', title: "BETON? T-SHIRT BLACK", price: "12000 ₸", image: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=800", type: "MERCH" }
            ];

            const openArticle = (id) => {
                setSelectedArticleId(id);
                setCurrentPage('article');
                window.scrollTo(0, 0);
            };

            const Navigation = () => (
                <nav className={`fixed top-0 w-full z-40 transition-all duration-300 border-b border-black ${scrolled ? 'bg-white py-3' : 'bg-white/80 backdrop-blur-sm py-4 md:py-6'}`}>
                    <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                        <div className="flex items-center space-x-8">
                            <button onClick={() => setCurrentPage('home')} className="text-2xl font-black tracking-tighter uppercase hover:text-[#FF00FF] transition-colors">Oblique</button>
                            <div className="hidden md:flex space-x-6 text-[10px] font-mono uppercase tracking-widest">
                                <button onClick={() => setCurrentPage('articles')} className="hover:line-through">Архив</button>
                                <button onClick={() => setCurrentPage('shop')} className="hover:line-through">Магазин</button>
                                <button onClick={() => setCurrentPage('about')} className="hover:line-through">О нас</button>
                            </div>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button className="relative p-2 hover:text-[#FF00FF] transition-colors" onClick={() => setCurrentPage('shop')}>
                                <Icon name="ShoppingCart" />
                                {cartCount > 0 && <span className="absolute top-0 right-0 bg-[#FF00FF] text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cartCount}</span>}
                            </button>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "X" : "Menu"} />
                            </button>
                        </div>
                    </div>
                </nav>
            );

            const Marquee = ({ text }) => (
                <div className="overflow-hidden whitespace-nowrap bg-black text-white py-3 border-y border-black">
                    <div className="animate-marquee uppercase font-mono text-[10px] tracking-[0.3em]">
                        {Array(10).fill(`${text} • `).join('')}
                    </div>
                </div>
            );

            const Home = () => (
                <div className="pt-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <section className="mb-16 md:mb-20 mt-4">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0 border border-black">
                            <div className="lg:col-span-8 border-b lg:border-b-0 lg:border-r border-black p-6 md:p-12 flex flex-col justify-between min-h-[400px] lg:min-h-[600px]">
                                <div>
                                    <span className="text-[10px] font-mono mb-4 block underline">#0.1 SPRING ISSUE</span>
                                    <h1 className="text-5xl md:text-7xl lg:text-[8rem] font-black leading-[0.85] tracking-tighter uppercase mb-8">
                                        Under<br/>ground<br/><span className="text-[#FF00FF]">Almaty</span>
                                    </h1>
                                </div>
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-6 mt-8">
                                    <p className="max-w-xs text-xs md:text-sm leading-tight uppercase font-bold opacity-80">
                                        Первый журнал андеграунд культуры Казахстана. Кухня, бары, тусовки, люди.
                                    </p>
                                    <button 
                                        onClick={() => setCurrentPage('shop')}
                                        className="bg-black text-white w-full sm:w-auto px-8 py-4 hover:bg-[#FF00FF] transition-colors flex items-center justify-center group font-bold text-xs"
                                    >
                                        КУПИТЬ ВЫПУСК <Icon name="ArrowRight" size={16} className="ml-2 group-hover:translate-x-1 transition-transform" />
                                    </button>
                                </div>
                            </div>
                            <div className="lg:col-span-4 relative overflow-hidden group aspect-square lg:aspect-auto lg:h-[600px]">
                                <img 
                                    src={articles[0].image} 
                                    alt="Oblique Cover" 
                                    className="w-full h-full object-cover img-reveal group-hover:scale-105"
                                />
                            </div>
                        </div>
                    </section>

                    <div className="-mx-4 sm:-mx-6 lg:-mx-8">
                        <Marquee text="Локальная кухня • Техно • Арт • Театры • Алматы • Андеграунд" />
                    </div>

                    <section className="py-16 md:py-24">
                        <div className="flex justify-between items-end mb-10 md:mb-12">
                            <h2 className="text-3xl md:text-5xl font-black uppercase tracking-tighter">Медиа платформа</h2>
                            <button onClick={() => setCurrentPage('articles')} className="text-[10px] font-mono uppercase underline underline-offset-4 hover:text-[#FF00FF] transition-colors">Смотреть все</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                            {articles.map((art) => (
                                <div key={art.id} className="border border-black group cursor-pointer flex flex-col" onClick={() => openArticle(art.id)}>
                                    <div className="relative overflow-hidden aspect-[4/5] border-b border-black">
                                        <img src={art.image} alt={art.title} className="w-full h-full object-cover img-reveal group-hover:scale-105" />
                                        <div className="absolute top-4 left-4 bg-black text-white text-[8px] px-2 py-1 font-mono uppercase">{art.category}</div>
                                    </div>
                                    <div className="p-5 bg-white group-hover:bg-black group-hover:text-white transition-colors flex-grow flex flex-col">
                                        <div className="flex space-x-2 mb-3">
                                            {art.tags.map(t => <span key={t} className="text-[8px] font-mono opacity-60">#{t}</span>)}
                                        </div>
                                        <h3 className="text-xl md:text-2xl font-black uppercase leading-none mb-3 tracking-tight">{art.title}</h3>
                                        <p className="text-[10px] md:text-xs opacity-70 mb-6 uppercase font-medium line-clamp-2">{art.description}</p>
                                        <div className="mt-auto flex items-center text-[9px] font-black uppercase tracking-widest opacity-50 group-hover:opacity-100 transition-opacity">
                                            Читать полностью <Icon name="ArrowRight" size={12} className="ml-1" />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="bg-black text-white py-24 md:py-32 px-6 mb-20">
                        <div className="text-center">
                            <h2 className="text-4xl md:text-6xl lg:text-8xl font-black uppercase tracking-tighter mb-8 leading-[0.85]">
                                КТО ШАТАЕТ<br/>ЭТОТ БЕТОН?
                            </h2>
                            <p className="max-w-xl mx-auto text-xs md:text-sm font-mono opacity-60 uppercase mb-12">
                                Мы приоткрываем пласт казахстанского андеграунда, чтобы показать вам то, что остается незамеченным, даже находясь прямо перед глазами.
                            </p>
                            <div className="flex flex-col sm:flex-row justify-center gap-4">
                                <button className="border border-white px-8 py-4 hover:bg-white hover:text-black transition-all font-bold uppercase tracking-widest text-[10px]">
                                    Подписаться
                                </button>
                                <button className="bg-[#FF00FF] text-white px-8 py-4 hover:opacity-80 transition-all font-bold uppercase tracking-widest text-[10px]">
                                    Архив номеров
                                </button>
                            </div>
                        </div>
                    </section>
                </div>
            );

            const SingleArticle = () => {
                const article = articles.find(a => a.id === selectedArticleId) || articles[0];
                return (
                    <div className="pt-28 md:pt-32 max-w-4xl mx-auto px-4 min-h-screen pb-20">
                        <button onClick={() => setCurrentPage('home')} className="flex items-center text-[10px] font-mono uppercase hover:text-[#FF00FF] transition-colors mb-8">
                            <Icon name="ArrowLeft" size={16} className="mr-2" /> Назад в город
                        </button>
                        <div className="relative overflow-hidden aspect-video border border-black mb-8 group">
                            <img src={article.image} alt={article.title} className="w-full h-full object-cover img-reveal" />
                        </div>
                        <div className="flex items-center gap-4 mb-6">
                            <span className="bg-[#FF00FF] text-white px-2 py-1 text-[10px] font-mono uppercase">{article.category}</span>
                            <div className="flex gap-2">
                                {article.tags.map(t => <span key={t} className="text-[10px] font-mono opacity-40 uppercase">#{t}</span>)}
                            </div>
                        </div>
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-black uppercase tracking-tighter leading-[0.9] mb-8">{article.title}</h1>
                        <div className="border-t border-black pt-8 font-medium uppercase leading-relaxed text-sm md:text-base opacity-90">
                            <p className="mb-6">{article.description}</p>
                            <p className="mb-6">Этот текст — заглушка для статьи. Здесь будет располагаться подробный материал о локации, людях или событиях. Мы исследуем городское пространство, превращаясь в серию временных зон, где идентичность определяется плотностью звука, температурой тел и скоростью.</p>
                            <p>Это маршрут, лишенный конечной цели — бесконечный дрейф между точками, где культура возникает как побочный эффект коллективного присутствия.</p>
                        </div>
                    </div>
                );
            };

            const ArticlesArchive = () => (
                <div className="pt-28 md:pt-32 max-w-7xl mx-auto px-4 min-h-screen pb-20">
                    <h2 className="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-12 border-b-4 border-black pb-4">Архив материалов</h2>
                    <div className="space-y-0">
                        {articles.concat(articles).map((art, i) => (
                            <div key={i} className="group border-b border-black py-8 md:py-12 flex flex-col md:flex-row gap-6 md:gap-8 items-center cursor-pointer hover:bg-neutral-50 px-2 md:px-4 transition-colors" onClick={() => openArticle(art.id)}>
                                <div className="text-[10px] font-mono opacity-30 hidden md:block">0{i+1}</div>
                                <div className="w-full md:w-1/4 aspect-[4/3] overflow-hidden border border-black">
                                    <img src={art.image} className="w-full h-full object-cover img-reveal group-hover:scale-105" />
                                </div>
                                <div className="flex-1 w-full text-left">
                                    <span className="text-[8px] font-mono uppercase bg-black text-white px-2 py-0.5 mb-3 inline-block">{art.category}</span>
                                    <h3 className="text-2xl md:text-4xl font-black uppercase tracking-tighter leading-none mb-4 group-hover:text-[#FF00FF] transition-colors">{art.title}</h3>
                                    <p className="text-[10px] md:text-xs font-medium opacity-60 uppercase max-w-xl">{art.description}</p>
                                </div>
                                <Icon name="ArrowRight" className="hidden md:block opacity-20 group-hover:opacity-100 transition-opacity group-hover:translate-x-4 transform duration-300" size={32} />
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Shop = () => (
                <div className="pt-28 md:pt-32 max-w-7xl mx-auto px-4 min-h-screen pb-20">
                    <div className="flex justify-between items-baseline mb-10 md:mb-12 border-b-2 border-black pb-4">
                        <h2 className="text-4xl md:text-5xl font-black uppercase tracking-tighter">Магазин</h2>
                        <span className="font-mono text-[10px] opacity-50 uppercase">{shopItems.length} позиции доступно</span>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-px bg-black border border-black">
                        {shopItems.map((item) => (
                            <div key={item.id} className="bg-white p-6 md:p-10 group">
                                <div className="aspect-[3/4] bg-neutral-100 mb-8 relative overflow-hidden flex items-center justify-center border border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
                                   <img src={item.image} alt={item.title} className="w-full h-full object-cover mix-blend-multiply img-reveal group-hover:scale-105" />
                                   <div className="absolute top-4 left-4 bg-black text-white font-mono text-[8px] px-2 py-1 uppercase">{item.type}</div>
                                </div>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="text-xl md:text-2xl font-black uppercase tracking-tight mb-2">{item.title}</h3>
                                        <p className="text-lg md:text-xl font-mono text-[#FF00FF]">{item.price}</p>
                                    </div>
                                    <button onClick={() => setCartCount(c => c + 1)} className="bg-black text-white w-10 h-10 md:w-12 md:h-12 flex items-center justify-center hover:bg-[#FF00FF] transition-colors">
                                        <span className="text-2xl font-bold">+</span>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Footer = () => (
                <footer className="bg-white border-t border-black pt-16 md:pt-20 pb-10 mt-10">
                    <div className="max-w-7xl mx-auto px-4">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-16 md:mb-20">
                            <div className="col-span-1 md:col-span-2">
                                <h3 className="text-3xl md:text-4xl font-black uppercase tracking-tighter mb-6">Oblique</h3>
                                <p className="max-w-sm text-xs uppercase leading-tight font-medium opacity-60">
                                    Локальная сцена Алматы. Мы — это зеркало, смещающее фокус на тех, кто в тени.
                                </p>
                            </div>
                            <div>
                                <h4 className="font-mono text-[10px] uppercase mb-6 opacity-40">Меню</h4>
                                <ul className="space-y-3 text-[10px] md:text-xs font-bold uppercase tracking-widest">
                                    <li><button onClick={() => setCurrentPage('home')} className="hover:text-[#FF00FF] transition-colors">Главная</button></li>
                                    <li><button onClick={() => setCurrentPage('articles')} className="hover:text-[#FF00FF] transition-colors">Архив</button></li>
                                    <li><button onClick={() => setCurrentPage('shop')} className="hover:text-[#FF00FF] transition-colors">Магазин</button></li>
                                    <li><button onClick={() => setCurrentPage('about')} className="hover:text-[#FF00FF] transition-colors">Редакция</button></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-mono text-[10px] uppercase mb-6 opacity-40">Контакты</h4>
                                <ul className="space-y-3 text-[10px] md:text-xs font-bold uppercase tracking-widest">
                                    <li><a href="#" className="flex items-center hover:text-[#FF00FF] transition-colors"><Icon name="Instagram" size={14} className="mr-2" /> Instagram</a></li>
                                    <li><a href="#" className="flex items-center hover:text-[#FF00FF] transition-colors"><Icon name="Facebook" size={14} className="mr-2" /> Facebook</a></li>
                                    <li><a href="mailto:info@oblique.kz" className="hover:text-[#FF00FF] transition-colors">info@oblique.kz</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="flex flex-col md:flex-row justify-between items-center text-[8px] md:text-[10px] font-mono uppercase opacity-40 border-t border-black/10 pt-8 gap-4 text-center md:text-left">
                            <p>© 2024 Oblique Magazine. Алматы, Казахстан.</p>
                            <div className="flex flex-wrap justify-center gap-4 md:gap-6">
                                <span>Печать: Этика</span>
                                <span>Design: Головинцева Ева</span>
                                <span>Editor: Иванникова Эльвира</span>
                            </div>
                        </div>
                    </div>
                </footer>
            );

            return (
                <div className="min-h-screen bg-white text-black font-sans selection:bg-[#FF00FF] selection:text-white overflow-x-hidden">
                    <div className="grain"></div>
                    <Navigation />

                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-white z-[100] p-6 md:p-8 flex flex-col justify-between">
                            <div className="flex justify-between items-center">
                                <span className="text-2xl font-black uppercase">Oblique</span>
                                <button onClick={() => setIsMenuOpen(false)}><Icon name="X" size={32} /></button>
                            </div>
                            <div className="flex flex-col space-y-6 text-4xl md:text-5xl font-black uppercase tracking-tighter">
                                <button onClick={() => {setCurrentPage('home'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left transition-colors">Главная</button>
                                <button onClick={() => {setCurrentPage('articles'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left transition-colors">Медиа</button>
                                <button onClick={() => {setCurrentPage('shop'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left transition-colors">Магазин</button>
                                <button onClick={() => {setCurrentPage('about'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left transition-colors">О нас</button>
                            </div>
                            <div className="font-mono text-[10px] md:text-xs uppercase opacity-50">
                                Almaty Underground Culture Journal
                            </div>
                        </div>
                    )}

                    {currentPage === 'home' && <Home />}
                    {currentPage === 'article' && <SingleArticle />}
                    {currentPage === 'articles' && <ArticlesArchive />}
                    {currentPage === 'shop' && <Shop />}
                    
                    {currentPage === 'about' && (
                        <div className="pt-28 md:pt-32 max-w-4xl mx-auto px-4 min-h-screen text-center pb-20">
                            <h2 className="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-10 md:mb-12">О журнале</h2>
                            <div className="bg-black text-white p-8 md:p-12 text-left mb-12 border-l-[12px] md:border-l-[20px] border-[#FF00FF]">
                                <p className="text-lg md:text-2xl lg:text-3xl font-bold uppercase leading-tight">
                                    «Дорогой читатель! Этот журнал разрабатывался в качестве дипломного проекта. Тем не менее, мы чётко понимаем его цель и задачу. Наша родина бескрайняя и многослойная.»
                                </p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 text-left uppercase font-mono text-[10px] md:text-xs">
                                <div className="border border-black p-4 md:p-6">
                                    <span className="opacity-40">Главный редактор:</span><br/>
                                    <span className="font-bold text-sm md:text-base">Иванникова Эльвира</span>
                                </div>
                                <div className="border border-black p-4 md:p-6">
                                    <span className="opacity-40">Шеф-редактор, дизайнер:</span><br/>
                                    <span className="font-bold text-sm md:text-base">Головинцева Ева</span>
                                </div>
                            </div>
                        </div>
                    )}

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
