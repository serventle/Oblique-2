<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE | Underground Almaty</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running React in a single file -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons (Global) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: white;
            color: black;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }
        
        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        /**
         * Компонент Icon максимально защищен от ошибок деструктуризации.
         * Используем прямые индексы вместо синтаксиса [a, b, c], чтобы избежать проблем с итераторами в Babel.
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svgContent, setSvgContent] = useState("");

            useEffect(() => {
                const lucideIcons = window.lucide?.icons;
                if (!lucideIcons) return;

                const iconData = lucideIcons[name];
                
                // Проверяем, является ли iconData массивом, чтобы избежать TypeError при деструктуризации
                if (iconData && Array.isArray(iconData)) {
                    const tag = iconData[0];
                    const attrs = iconData[1];
                    const children = iconData[2];
                    
                    let childrenHtml = "";
                    if (Array.isArray(children)) {
                        childrenHtml = children.map(child => {
                            if (!Array.isArray(child)) return "";
                            const childTag = child[0];
                            const childAttrs = child[1];
                            const attrStr = Object.entries(childAttrs || {})
                                .map(([k, v]) => `${k}="${v}"`)
                                .join(' ');
                            return `<${childTag} ${attrStr}></${childTag}>`;
                        }).join('');
                    }
                    
                    const svgAttrs = { 
                        ...attrs, 
                        width: size, 
                        height: size, 
                        class: `lucide lucide-${name.toLowerCase()} ${className}` 
                    };
                    
                    const svgAttrStr = Object.entries(svgAttrs)
                        .map(([k, v]) => `${k}="${v}"`)
                        .join(' ');
                    
                    setSvgContent(`<svg ${svgAttrStr}>${childrenHtml}</svg>`);
                }
            }, [name, size, className]);

            return (
                <span 
                    className="inline-flex items-center justify-center leading-none"
                    dangerouslySetInnerHTML={{ __html: svgContent }} 
                />
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [cartCount, setCartCount] = useState(0);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const articles = [
                {
                    id: 1,
                    title: "COLOSSUS: БЫВШИЙ ДОМ ПЕЧАТИ",
                    category: "МЕСТА",
                    tags: ["TECHNO", "INDUSTRY"],
                    image: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800",
                    description: "Пространство, которое не заигрывает с посетителем. Оно подавляет масштабом."
                },
                {
                    id: 2,
                    title: "TULPAN BERLIN: ГЛЯНЕЦ И КРАСНЫЙ ДЫМ",
                    category: "МЕСТА",
                    tags: ["STUDIO", "RAVE"],
                    image: "https://images.unsplash.com/photo-1574169208507-84376144848b?auto=format&fit=crop&q=80&w=800",
                    description: "Днем — стерильный бокс для Bazaar. Ночью — вибрирующий резервуар VIHOD."
                },
                {
                    id: 3,
                    title: "БАРИБАЕВА: ГОД ПОСЛЕ ВЫСЕЛЕНИЯ",
                    category: "КУЛЬТУРА",
                    tags: ["COMMUNITY", "ALMATY"],
                    image: "https://images.unsplash.com/photo-1514306191717-452ec28c7814?auto=format&fit=crop&q=80&w=800",
                    description: "Творческое ядро города переместилось на сорок шагов в сторону."
                }
            ];

            const shopItems = [
                {
                    id: 'print-01',
                    title: "OBLIQUE ISSUE #0.1",
                    price: "5000 ₸",
                    image: "https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&q=80&w=800",
                    type: "PRINT"
                },
                {
                    id: 'tee-01',
                    title: "BETON? T-SHIRT BLACK",
                    price: "12000 ₸",
                    image: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=800",
                    type: "MERCH"
                }
            ];

            const Navigation = () => (
                <nav className={`fixed top-0 w-full z-40 transition-all duration-300 border-b border-black ${scrolled ? 'bg-white py-2' : 'bg-transparent py-4 md:py-6'}`}>
                    <div className="container mx-auto px-4 flex justify-between items-center">
                        <div className="flex items-center space-x-8">
                            <button onClick={() => setCurrentPage('home')} className="text-xl md:text-2xl font-black tracking-tighter uppercase">Oblique</button>
                            <div className="hidden md:flex space-x-6 text-[10px] font-mono uppercase tracking-widest">
                                <button onClick={() => setCurrentPage('articles')} className="hover:line-through">Медиа</button>
                                <button onClick={() => setCurrentPage('shop')} className="hover:line-through">Магазин</button>
                                <button onClick={() => setCurrentPage('about')} className="hover:line-through">О нас</button>
                            </div>
                        </div>
                        <div className="flex items-center space-x-4">
                            <button className="relative p-2" onClick={() => setCurrentPage('shop')}>
                                <Icon name="ShoppingCart" />
                                {cartCount > 0 && <span className="absolute top-0 right-0 bg-[#FF00FF] text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cartCount}</span>}
                            </button>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "X" : "Menu"} />
                            </button>
                        </div>
                    </div>
                </nav>
            );

            const Marquee = ({ text }) => (
                <div className="overflow-hidden whitespace-nowrap bg-black text-white py-2 border-y border-black">
                    <div className="animate-marquee uppercase font-mono text-[10px] tracking-[0.3em]">
                        {Array(10).fill(`${text} • `).join('')}
                    </div>
                </div>
            );

            const Home = () => (
                <div className="pt-20 md:pt-24">
                    <section className="px-4 mb-12 md:mb-20">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0 border-t border-l border-black">
                            <div className="lg:col-span-8 border-r border-b border-black p-4 md:p-8 flex flex-col justify-between aspect-square md:aspect-video lg:aspect-auto">
                                <div>
                                    <span className="text-[10px] font-mono mb-4 block underline">#0.1 SPRING ISSUE</span>
                                    <h1 className="text-5xl md:text-8xl lg:text-[9rem] font-black leading-[0.85] tracking-tighter uppercase mb-8">
                                        Under<br/>ground<br/><span className="text-[#FF00FF]">Almaty</span>
                                    </h1>
                                </div>
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                                    <p className="max-w-xs text-xs md:text-sm leading-tight uppercase font-medium">
                                        Первый журнал андеграунд культуры Казахстана. Кухня, бары, тусовки, люди.
                                    </p>
                                    <button 
                                        onClick={() => setCurrentPage('shop')}
                                        className="bg-black text-white w-full md:w-auto px-8 py-4 hover:bg-[#FF00FF] transition-colors flex items-center justify-center group font-bold text-xs"
                                    >
                                        КУПИТЬ ВЫПУСК <Icon name="ArrowRight" className="ml-2 group-hover:translate-x-1 transition-transform" size={14} />
                                    </button>
                                </div>
                            </div>
                            <div className="lg:col-span-4 border-r border-b border-black relative overflow-hidden group aspect-square md:aspect-auto">
                                <img 
                                    src="https://images.unsplash.com/photo-1598387993441-a364f854c3e1?auto=format&fit=crop&q=80&w=800" 
                                    alt="Oblique Cover" 
                                    className="w-full h-full object-cover grayscale contrast-125 group-hover:scale-105 transition-transform duration-700"
                                />
                                <div className="absolute inset-0 bg-[#FF00FF] mix-blend-multiply opacity-20 group-hover:opacity-0 transition-opacity"></div>
                            </div>
                        </div>
                    </section>

                    <Marquee text="Локальная кухня • Техно • Арт • Театры • Алматы • Андеграунд" />

                    <section className="container mx-auto px-4 py-16 md:py-24">
                        <div className="flex justify-between items-end mb-8 md:mb-12">
                            <h2 className="text-3xl md:text-4xl font-black uppercase tracking-tighter">Медиа платформа</h2>
                            <button onClick={() => setCurrentPage('articles')} className="text-[10px] font-mono uppercase underline underline-offset-4 hover:text-[#FF00FF]">Смотреть все</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                            {articles.map((art) => (
                                <div key={art.id} className="border border-black group cursor-pointer" onClick={() => setCurrentPage('articles')}>
                                    <div className="relative overflow-hidden aspect-[4/5]">
                                        <img src={art.image} alt={art.title} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />
                                        <div className="absolute top-4 left-4 bg-black text-white text-[8px] px-2 py-1 font-mono uppercase">{art.category}</div>
                                    </div>
                                    <div className="p-4 bg-white border-t border-black group-hover:bg-black group-hover:text-white transition-colors">
                                        <div className="flex space-x-2 mb-2">
                                            {art.tags.map(t => <span key={t} className="text-[8px] font-mono opacity-60">#{t}</span>)}
                                        </div>
                                        <h3 className="text-lg font-bold uppercase leading-tight mb-2 tracking-tight">{art.title}</h3>
                                        <p className="text-[10px] opacity-70 mb-4 line-clamp-2 uppercase">{art.description}</p>
                                        <div className="flex items-center text-[8px] font-black uppercase tracking-widest">
                                            Читать полностью <Icon name="ArrowRight" size={10} className="ml-1" />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <section className="bg-black text-white py-20 md:py-32 px-4">
                        <div className="container mx-auto text-center">
                            <h2 className="text-4xl md:text-8xl font-black uppercase tracking-tighter mb-8 leading-[0.85]">
                                КТО ШАТАЕТ<br/>ЭТОТ БЕТОН?
                            </h2>
                            <p className="max-w-xl mx-auto text-xs md:text-sm font-mono opacity-60 uppercase mb-12 px-4">
                                Мы приоткрываем пласт казахстанского андеграунда, чтобы показать вам то, что остается незамеченным.
                            </p>
                            <div className="flex flex-col md:flex-row justify-center gap-4">
                                <button className="border-2 border-white px-8 py-4 hover:bg-white hover:text-black transition-all font-bold uppercase tracking-widest text-xs">
                                    Подписаться
                                </button>
                                <button className="bg-[#FF00FF] text-white px-8 py-4 hover:opacity-80 transition-all font-bold uppercase tracking-widest text-xs">
                                    Архив номеров
                                </button>
                            </div>
                        </div>
                    </section>
                </div>
            );

            const Shop = () => (
                <div className="pt-24 md:pt-32 container mx-auto px-4 min-h-screen">
                    <div className="flex justify-between items-baseline mb-8 md:mb-12 border-b-2 border-black pb-4">
                        <h2 className="text-4xl md:text-5xl font-black uppercase tracking-tighter">Магазин</h2>
                        <span className="font-mono text-[10px] opacity-50 uppercase">{shopItems.length} позиции доступно</span>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-px bg-black border border-black">
                        {shopItems.map((item) => (
                            <div key={item.id} className="bg-white p-6 md:p-8 group">
                                <div className="aspect-[3/4] bg-neutral-100 mb-6 relative overflow-hidden flex items-center justify-center">
                                    <img src={item.image} alt={item.title} className="w-full h-full object-cover mix-blend-multiply grayscale group-hover:grayscale-0 group-hover:scale-105 transition-all duration-700" />
                                    <div className="absolute top-4 left-4 bg-black text-white font-mono text-[8px] px-2 py-1 uppercase">{item.type}</div>
                                </div>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <h3 className="text-xl md:text-2xl font-black uppercase tracking-tight mb-1">{item.title}</h3>
                                        <p className="text-lg md:text-xl font-mono text-[#FF00FF]">{item.price}</p>
                                    </div>
                                    <button 
                                        onClick={() => setCartCount(c => c + 1)}
                                        className="bg-black text-white w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center hover:bg-[#FF00FF] transition-colors font-bold text-xl"
                                    >
                                        +
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Footer = () => (
                <footer className="bg-white border-t border-black pt-16 md:pt-20 pb-10 mt-12 md:mt-20">
                    <div className="container mx-auto px-4">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-16 md:mb-20">
                            <div className="md:col-span-2">
                                <h3 className="text-3xl md:text-4xl font-black uppercase tracking-tighter mb-6">Oblique</h3>
                                <p className="max-w-xs text-xs md:text-sm uppercase leading-tight font-medium opacity-60">
                                    Локальная сцена Алматы. Мы — это зеркало, смещающее фокус на тех, кто в тени.
                                </p>
                            </div>
                            <div>
                                <h4 className="font-mono text-[10px] uppercase mb-6 opacity-40">Меню</h4>
                                <ul className="space-y-2 text-xs font-bold uppercase tracking-widest">
                                    <li><button onClick={() => setCurrentPage('home')}>Главная</button></li>
                                    <li><button onClick={() => setCurrentPage('articles')}>Статьи</button></li>
                                    <li><button onClick={() => setCurrentPage('shop')}>Магазин</button></li>
                                    <li><button onClick={() => setCurrentPage('about')}>Редакция</button></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-mono text-[10px] uppercase mb-6 opacity-40">Контакты</h4>
                                <ul className="space-y-2 text-xs font-bold uppercase tracking-widest">
                                    <li><a href="#" className="flex items-center">Instagram</a></li>
                                    <li><a href="#" className="flex items-center">Facebook</a></li>
                                    <li><a href="mailto:info@oblique.kz">info@oblique.kz</a></li>
                                </ul>
                            </div>
                        </div>
                        <div className="flex flex-col md:flex-row justify-between items-center text-[8px] md:text-[10px] font-mono uppercase opacity-40 border-t border-black/10 pt-8 gap-4">
                            <p>© 2024 Oblique Magazine. Алматы, Казахстан.</p>
                            <div className="flex flex-wrap justify-center space-x-4 md:space-x-6">
                                <span>Печать: Этика</span>
                                <span>Design: Ева</span>
                                <span>Editor: Эльвира</span>
                            </div>
                        </div>
                    </div>
                </footer>
            );

            return (
                <div className="min-h-screen bg-white text-black selection:bg-[#FF00FF] selection:text-white overflow-x-hidden">
                    <div className="grain"></div>
                    <Navigation />

                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-white z-[100] p-6 flex flex-col justify-between">
                            <div className="flex justify-between items-center">
                                <span className="text-xl font-black uppercase">Oblique</span>
                                <button onClick={() => setIsMenuOpen(false)}><Icon name="X" size={32} /></button>
                            </div>
                            <div className="flex flex-col space-y-6 text-4xl font-black uppercase tracking-tighter">
                                <button onClick={() => {setCurrentPage('home'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left">Главная</button>
                                <button onClick={() => {setCurrentPage('articles'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left">Медиа</button>
                                <button onClick={() => {setCurrentPage('shop'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left">Магазин</button>
                                <button onClick={() => {setCurrentPage('about'); setIsMenuOpen(false)}} className="hover:text-[#FF00FF] text-left">О нас</button>
                            </div>
                            <div className="font-mono text-[10px] uppercase opacity-50">
                                Almaty Underground Culture Journal
                            </div>
                        </div>
                    )}

                    {currentPage === 'home' && <Home />}
                    {currentPage === 'articles' && (
                        <div className="pt-24 md:pt-32 container mx-auto px-4 min-h-screen">
                            <h2 className="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-12 border-b-4 border-black pb-4">Архив материалов</h2>
                            <div className="space-y-0">
                                {articles.concat(articles).map((art, i) => (
                                    <div key={i} className="group border-b border-black py-8 md:py-12 flex flex-col md:flex-row gap-6 md:gap-8 items-center cursor-pointer hover:bg-neutral-50 px-2 md:px-4 transition-colors">
                                        <div className="text-[10px] font-mono opacity-30">0{i+1}</div>
                                        <div className="w-full md:w-1/3 aspect-video overflow-hidden border border-black">
                                            <img src={art.image} className="w-full h-full object-cover grayscale group-hover:scale-105 transition-transform" />
                                        </div>
                                        <div className="flex-1">
                                            <span className="text-[8px] font-mono uppercase bg-black text-white px-2 py-0.5 mb-2 md:mb-4 inline-block">{art.category}</span>
                                            <h3 className="text-2xl md:text-4xl font-black uppercase tracking-tighter leading-none mb-4 group-hover:text-[#FF00FF]">{art.title}</h3>
                                            <p className="text-[10px] md:text-xs font-medium opacity-60 uppercase max-w-xl">{art.description}</p>
                                        </div>
                                        <Icon name="ArrowRight" className="hidden md:block group-hover:translate-x-4 transition-transform opacity-30" size={32} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {currentPage === 'shop' && <Shop />}
                    {currentPage === 'about' && (
                        <div className="pt-24 md:pt-32 container mx-auto px-4 min-h-screen max-w-4xl text-center">
                            <h2 className="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-12">О журнале</h2>
                            <div className="bg-black text-white p-8 md:p-12 text-left mb-12 border-l-[12px] md:border-l-[20px] border-[#FF00FF]">
                                <p className="text-lg md:text-3xl font-bold uppercase leading-tight">
                                    «Это письмо адресовано именно вам, ведь кто, как не наши читатели, определяет суть и ценность нашего творения. Мы чётко понимаем его цель и задачу.»
                                </p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-8 text-left uppercase font-mono text-[10px] md:text-xs">
                                <div className="border border-black p-4">
                                    <span className="opacity-40">Главный редактор:</span><br/>
                                    <span className="font-bold">Иванникова Эльвира</span>
                                </div>
                                <div className="border border-black p-4">
                                    <span className="opacity-40">Шеф-редактор, дизайнер:</span><br/>
                                    <span className="font-bold">Головинцева Ева</span>
                                </div>
                            </div>
                        </div>
                    )}

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
