<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE | Digital Underground Media</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Идеальное трио шрифтов: 
           1. Oswald - Дисплейный (Заголовки)
           2. Inter - Гротеск (Базовый текст)
           3. Playfair Display - Антиква (Цитаты, акценты, фэшн-вайб) 
        */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Oswald:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F4F4F0; 
            color: #000; 
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .font-display { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: -0.01em; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* Текстура */
        .grain { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 999; opacity: 0.05; 
            background-image: url('https://grainy-gradients.vercel.app/noise.svg'); 
        }
        
        /* Брутальные элементы */
        .border-brutal { border: 2px solid #000; }
        .border-b-brutal { border-bottom: 2px solid #000; }
        .border-r-brutal { border-right: 2px solid #000; }
        .border-t-brutal { border-top: 2px solid #000; }
        .border-l-brutal { border-left: 2px solid #000; }
        
        .shadow-brutal { box-shadow: 6px 6px 0px 0px #000; transition: all 0.2s; }
        .shadow-brutal:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px 0px #000; }
        
        /* Эффект обесцвечивания */
        .img-editorial { filter: grayscale(100%) contrast(1.15); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .group:hover .img-editorial, .img-editorial:hover { filter: grayscale(0%) contrast(1.0); transform: scale(1.02); }
        
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; animation: marquee 15s linear infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F4F4F0; border-left: 1px solid #000; }
        ::-webkit-scrollbar-thumb { background: #000; }
        
        ::selection { background: #CCFF00; color: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const props = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "square", strokeLinejoin: "miter", className };
            switch(name) {
                case "Menu": return <svg {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
                case "X": return <svg {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
                case "ArrowRight": return <svg {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
                case "ArrowLeft": return <svg {...props}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
                case "ShoppingCart": return <svg {...props}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
                default: return null;
            }
        };

        const App = () => {
  apiKey: "AIzaSyBZNSov-zWX8HXNjTRIhCXRDIDWGb-n0Q4",
  authDomain: "oblique-magazine.firebaseapp.com",
  projectId: "oblique-magazine",
  storageBucket: "oblique-magazine.firebasestorage.app",
  messagingSenderId: "452986058459",
  appId: "1:452986058459:web:85ab1b7a1c68f491997efe",
  measurementId: "G-JDEGJQ3KPM"
};

            // Журнальные данные
            const articles = [
                { 
                    id: 1, 
                    title: "COLOSSUS: БЫВШИЙ ДОМ ПЕЧАТИ", 
                    category: "МЕСТА", 
                    tags: ["TECHNO", "INDUSTRY"], 
                    author: "Эльвира Иванникова",
                    date: "23 АПР 2026",
                    readTime: "5 MIN",
                    image: "https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=1200", 
                    description: "Пространство, которое не заигрывает с посетителем. Оно подавляет масштабом, сохраняя тяжесть индустриальной основы.",
                    quote: "Архитектура здесь диктует масштаб человеческого опыта. Мы лишь временные пассажиры в этом монолите."
                },
                { 
                    id: 2, 
                    title: "TULPAN BERLIN: ГЛЯНЕЦ И КРАСНЫЙ ДЫМ", 
                    category: "МЕСТА", 
                    tags: ["STUDIO", "RAVE"], 
                    author: "Ева Головинцева",
                    date: "18 АПР 2026",
                    readTime: "4 MIN",
                    image: "https://images.unsplash.com/photo-1574169208507-84376144848b?auto=format&fit=crop&q=80&w=1200", 
                    description: "Днем — стерильный бокс для съемок Bazaar. Ночью — вибрирующий резервуар ВИХОД, где статусность аннулируется.",
                    quote: "Когда пространство заливает густой красный дым, фотолаборатория превращается в тесный резервуар чистого звука."
                },
                { 
                    id: 3, 
                    title: "БАРИБАЕВА: ГОД ПОСЛЕ ВЫСЕЛЕНИЯ", 
                    category: "КУЛЬТУРА", 
                    tags: ["COMMUNITY", "ALMATY"], 
                    author: "Эльвира Иванникова",
                    date: "10 АПР 2026",
                    readTime: "7 MIN",
                    image: "https://images.unsplash.com/photo-1514306191717-452ec28c7814?auto=format&fit=crop&q=80&w=1200", 
                    description: "Творческое ядро города переместилось на сорок шагов в сторону. Здание осваивает формат коммерческого арт-центра.",
                    quote: "Культура не исчезла, она просто распределилась, как вода, находящая новые трещины в бетоне."
                },
                { 
                    id: 4, 
                    title: "СУБЪЕКТИВНАЯ КУХНЯ: ГАСТРО-ГИД", 
                    category: "ЕДА", 
                    tags: ["FOOD", "CULTURE"], 
                    author: "Редакция OBLIQUE",
                    date: "05 АПР 2026",
                    readTime: "3 MIN",
                    image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&q=80&w=1200", 
                    description: "Точки пересечения мирового барного искусства и хаоса азиатской закусочной. Честный взгляд на гастрономию.",
                    quote: "Вкус здесь формируется не мишленовскими звездами, а неоном, шумом улицы и дымом от гриля."
                }
            ];

            const shopItems = [
                { id: '1', title: "OBLIQUE ISSUE #0.1 (PRINT)", price: "5000 ₸", image: "https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&q=80&w=800", type: "PRINT" },
                { id: '2', title: "BETON TEE (BLACK)", price: "12000 ₸", image: "https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=800", type: "MERCH" }
            ];

            const openArticle = (id) => {
                setSelectedArticleId(id);
                setCurrentPage('article');
                window.scrollTo(0, 0);
            };

            const Navigation = () => (
                <nav className="fixed top-0 w-full z-50 bg-[#F4F4F0]/95 backdrop-blur-md border-b-brutal">
                    <div className="w-full px-6 flex justify-between items-center h-16 md:h-20">
                        <div className="flex items-center space-x-12">
                            <button onClick={() => setCurrentPage('home')} className="text-3xl md:text-4xl font-display tracking-tight hover:text-[#0033FF] transition-colors">OBLIQUE</button>
                            <div className="hidden md:flex space-x-8 font-sans text-[10px] font-bold tracking-widest uppercase mt-1">
                                <button onClick={() => setCurrentPage('articles')} className="hover:text-[#FF00FF] transition-colors">Архив</button>
                                <button onClick={() => setCurrentPage('shop')} className="hover:text-[#FF00FF] transition-colors">Магазин</button>
                                <button onClick={() => setCurrentPage('about')} className="hover:text-[#FF00FF] transition-colors">О нас</button>
                            </div>
                        </div>
                        <div className="flex items-center space-x-6">
                            <button className="relative hover:text-[#0033FF] transition-colors" onClick={() => setCurrentPage('shop')}>
                                <Icon name="ShoppingCart" size={22} />
                                {cartCount > 0 && <span className="absolute -top-2 -right-3 bg-[#CCFF00] text-black text-[9px] font-bold w-5 h-5 rounded-full flex items-center justify-center font-sans border-brutal">{cartCount}</span>}
                            </button>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "X" : "Menu"} size={26} />
                            </button>
                        </div>
                    </div>
                </nav>
            );

            const Marquee = ({ text }) => (
                <div className="overflow-hidden whitespace-nowrap border-b-brutal bg-[#FF00FF] text-white py-3">
                    <div className="animate-marquee font-sans font-bold text-[10px] md:text-xs tracking-[0.2em] uppercase">
                        {Array(15).fill(text + ' +++ ').join('')}
                    </div>
                </div>
            );

            const Home = () => {
                const heroArticle = articles[0];
                const gridArticles = articles.slice(1);

                return (
                    <div className="pt-16 md:pt-20 w-full">
                        {/* Editorial Hero */}
                        <section className="flex flex-col lg:flex-row w-full border-b-brutal min-h-[85vh] bg-white">
                            <div className="w-full lg:w-1/3 border-b-brutal lg:border-b-0 lg:border-r-brutal p-8 md:p-12 flex flex-col justify-between order-2 lg:order-1 bg-white relative">
                                <div>
                                    <span className="font-sans font-bold text-[10px] mb-8 inline-block bg-[#0033FF] text-white px-3 py-1 tracking-widest uppercase">ISSUE 0.1 / KAZAKHSTAN</span>
                                    <h1 className="text-6xl sm:text-7xl lg:text-8xl xl:text-9xl font-display leading-[0.85] tracking-tight uppercase mb-6 text-black break-words">
                                        UNDER<br/>GROUND<br/>ALMATY
                                    </h1>
                                    <p className="text-xs font-sans font-bold uppercase leading-relaxed opacity-60 mb-8 max-w-xs">
                                        Локальная кухня, бары, тусовки, театры, люди и честный вайб города.
                                    </p>
                                </div>
                                <div className="mt-12">
                                    <button 
                                        onClick={() => setCurrentPage('shop')}
                                        className="w-full py-5 bg-[#CCFF00] text-black hover:bg-black hover:text-[#CCFF00] transition-colors flex items-center justify-between px-6 font-sans font-bold text-[10px] tracking-widest uppercase border-brutal shadow-brutal"
                                    >
                                        <span>Купить принт</span>
                                        <Icon name="ArrowRight" size={16} />
                                    </button>
                                </div>
                            </div>
                            
                            <div className="w-full lg:w-2/3 relative overflow-hidden group h-[60vh] lg:h-auto order-1 lg:order-2 bg-black cursor-pointer" onClick={() => openArticle(heroArticle.id)}>
                                <img src={heroArticle.image} alt="Oblique Cover" className="w-full h-full object-cover img-editorial absolute inset-0 opacity-80 group-hover:opacity-100" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent opacity-100 group-hover:opacity-80 transition-opacity duration-500"></div>
                                
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-8">
                                    <span className="text-[#CCFF00] font-serif italic text-xl md:text-3xl mb-4 opacity-0 group-hover:opacity-100 transition-opacity duration-500 transform translate-y-4 group-hover:translate-y-0">Featured Story</span>
                                    <h2 className="text-white text-5xl md:text-7xl lg:text-[8rem] font-display uppercase opacity-0 group-hover:opacity-100 transition-all duration-700 text-center leading-[0.85] transform translate-y-8 group-hover:translate-y-0">
                                        {heroArticle.title}
                                    </h2>
                                </div>
                                <div className="absolute top-6 right-6 bg-[#FF00FF] text-white font-sans font-bold text-[9px] px-3 py-1 tracking-widest uppercase">
                                    {heroArticle.category}
                                </div>
                            </div>
                        </section>

                        <Marquee text="LOCAL SCENE • TECHNO • ART • THEATRE • ALMATY" />

                        {/* Сетка статей с метаданными */}
                        <section className="w-full bg-[#F4F4F0] py-20 md:py-32 border-b-brutal">
                            <div className="max-w-screen-2xl mx-auto px-6 md:px-12">
                                <div className="flex justify-between items-end mb-12">
                                    <h2 className="text-5xl md:text-7xl font-display uppercase tracking-tight leading-none">Платформа</h2>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
                                    {gridArticles.map((art) => (
                                        <div key={art.id} className="group cursor-pointer flex flex-col" onClick={() => openArticle(art.id)}>
                                            <div className="relative overflow-hidden aspect-[3/4] border-brutal shadow-brutal mb-6 bg-black">
                                                <img src={art.image} className="w-full h-full object-cover img-editorial opacity-90 group-hover:opacity-100" />
                                                <div className="absolute top-4 left-4 bg-white text-black font-sans font-bold text-[9px] px-3 py-1 tracking-widest uppercase border-brutal group-hover:bg-[#CCFF00] transition-colors">{art.category}</div>
                                            </div>
                                            {/* Editorial Metadata */}
                                            <div className="flex justify-between items-center mb-3 text-[9px] font-sans font-bold uppercase tracking-widest opacity-50 border-b border-black/20 pb-2">
                                                <span>{art.date}</span>
                                                <span>{art.readTime}</span>
                                            </div>
                                            <h3 className="text-3xl md:text-4xl font-display uppercase leading-[0.9] mb-3 group-hover:text-[#0033FF] transition-colors">{art.title}</h3>
                                            <p className="text-xs opacity-70 font-sans font-medium line-clamp-2 mb-4 leading-relaxed">{art.description}</p>
                                            <p className="text-[10px] font-sans font-bold uppercase tracking-widest mt-auto">Words by <span className="underline decoration-[#FF00FF]">{art.author}</span></p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>
                    </div>
                );
            };

            const SingleArticle = () => {
                const article = articles.find(a => a.id === selectedArticleId) || articles[0];

                return (
                    <div className="pt-16 md:pt-20 w-full min-h-screen bg-[#F4F4F0]">
                        <div className="flex flex-col lg:flex-row w-full min-h-[calc(100vh-80px)]">
                            {/* Sticky Photo */}
                            <div className="w-full lg:w-1/2 h-[50vh] lg:h-[calc(100vh-80px)] lg:sticky top-20 border-b-brutal lg:border-b-0 lg:border-r-brutal bg-black relative">
                                <img src={article.image} alt={article.title} className="w-full h-full object-cover img-editorial opacity-90" />
                                <div className="absolute top-6 left-6 bg-[#CCFF00] text-black px-3 py-1 text-[10px] font-sans font-bold tracking-widest uppercase border-brutal">
                                    {article.category}
                                </div>
                            </div>
                            
                            {/* Article Content Layout */}
                            <div className="w-full lg:w-1/2 bg-white p-8 md:p-16 lg:p-24 overflow-y-auto">
                                <button onClick={() => setCurrentPage('home')} className="flex items-center text-[10px] font-sans font-bold uppercase tracking-widest hover:text-[#0033FF] transition-colors mb-12">
                                    <Icon name="ArrowLeft" size={16} className="mr-3" /> Вернуться
                                </button>
                                
                                {/* Editorial Meta */}
                                <div className="flex flex-wrap gap-6 text-[9px] font-sans font-bold uppercase tracking-widest opacity-60 mb-8 border-b-2 border-black pb-4">
                                    <span>{article.date}</span>
                                    <span>{article.readTime} READ</span>
                                    <span>WORDS: {article.author}</span>
                                </div>

                                <h1 className="text-5xl md:text-7xl lg:text-[5.5rem] font-display uppercase tracking-tight leading-[0.85] mb-12">
                                    {article.title}
                                </h1>
                                
                                {/* Вводный текст (Lead) */}
                                <p className="text-lg md:text-xl font-sans font-bold uppercase leading-relaxed mb-12">
                                    {article.description}
                                </p>

                                {/* Контент статьи */}
                                <div className="font-sans text-sm md:text-base leading-relaxed opacity-90 space-y-8 max-w-2xl text-justify">
                                    <p>Городское пространство редко бывает статичным. Оно пульсирует, меняет агрегатные состояния, выталкивает из себя старые смыслы и впитывает новые. Алматы сегодня — это не просто фасады зданий и сетка улиц. Это сложная экосистема, которая считывается через андеграунд.</p>
                                    
                                    {/* Pull Quote (Цитата с засечками) */}
                                    <blockquote className="my-16 pl-6 md:pl-10 border-l-[6px] border-[#FF00FF]">
                                        <p className="text-2xl md:text-4xl font-serif italic text-[#0033FF] leading-snug">
                                            "{article.quote}"
                                        </p>
                                    </blockquote>

                                    <p>Мы исследуем этот маршрут, лишенный конечной цели. Это бесконечный дрейф между точками, где культура возникает как побочный эффект коллективного присутствия. Студия сбрасывает глянцевую оболочку, когда пространство заливает густой, непроглядный дым. В этот момент статусность аннулируется, остается только чистый опыт.</p>
                                    <p>Этот текст служит примером редакционной верстки. В реальном проекте здесь будет располагаться глубокое интервью, эссе или фоторепортаж, сверстанный по всем канонам модного глянца.</p>
                                </div>

                                {/* Share / End */}
                                <div className="mt-20 pt-8 border-t-2 border-black flex justify-between items-center text-[10px] font-sans font-bold uppercase tracking-widest">
                                    <span>OBLIQUE MAG © 2026</span>
                                    <button className="hover:text-[#FF00FF] transition-colors">Поделиться +</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const ArticlesArchive = () => (
                <div className="pt-16 md:pt-20 w-full min-h-screen pb-20 bg-white">
                    <div className="px-6 md:px-12 py-16 md:py-24 border-b-brutal bg-[#0033FF] text-[#CCFF00]">
                        <h2 className="text-6xl md:text-[8rem] font-display uppercase tracking-tight leading-none">Архив</h2>
                    </div>
                    <div className="w-full">
                        {articles.map((art, i) => (
                            <div key={i} className="group border-b-brutal flex flex-col lg:flex-row cursor-pointer hover:bg-[#F4F4F0] transition-colors" onClick={() => openArticle(art.id)}>
                                <div className="w-full lg:w-1/4 aspect-video lg:aspect-square overflow-hidden border-b-brutal lg:border-b-0 lg:border-r-brutal shrink-0 relative bg-black">
                                    <img src={art.image} className="w-full h-full object-cover img-editorial opacity-80 group-hover:opacity-100 group-hover:scale-105" />
                                    <div className="absolute top-4 left-4 bg-white text-black text-[9px] px-3 py-1 font-bold uppercase tracking-widest font-sans border-brutal">{art.category}</div>
                                </div>
                                <div className="p-8 md:p-12 lg:p-16 flex-1 flex flex-col justify-center">
                                    <div className="text-[10px] font-sans font-bold uppercase tracking-widest opacity-50 mb-4">{art.date} • {art.author}</div>
                                    <h3 className="text-4xl md:text-6xl font-display uppercase tracking-tight leading-[0.9] mb-4 group-hover:text-[#0033FF] transition-colors">{art.title}</h3>
                                    <p className="text-xs font-sans font-medium uppercase opacity-60 max-w-xl">{art.description}</p>
                                </div>
                                <div className="hidden lg:flex items-center justify-center p-12 text-[#FF00FF] opacity-0 group-hover:opacity-100 transition-all group-hover:translate-x-2">
                                    <Icon name="ArrowRight" size={48} />
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Shop = () => (
                <div className="pt-16 md:pt-20 w-full min-h-screen bg-[#F4F4F0]">
                    <div className="px-6 md:px-12 py-12 md:py-20 border-b-brutal bg-white flex flex-col justify-end">
                        <h2 className="text-6xl md:text-[8rem] font-display uppercase tracking-tight leading-none mb-4">Стор</h2>
                        <span className="text-[10px] font-sans font-bold tracking-widest uppercase opacity-50">Edition 01 / Merch & Prints</span>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 w-full border-b-brutal bg-white">
                        {shopItems.map((item, idx) => (
                            <div key={item.id} className={`p-8 md:p-16 group flex flex-col hover:bg-[#CCFF00] transition-colors ${idx !== 0 ? 'border-t-brutal lg:border-t-0 lg:border-l-brutal' : ''}`}>
                                <div className="aspect-square bg-white mb-12 relative overflow-hidden flex items-center justify-center border-brutal shadow-brutal group-hover:shadow-none group-hover:translate-x-1 group-hover:translate-y-1 transition-all">
                                   <img src={item.image} className="w-full h-full object-cover mix-blend-multiply img-editorial" />
                                   <div className="absolute top-4 left-4 bg-[#FF00FF] text-white font-bold text-[9px] font-sans px-3 py-1 tracking-widest uppercase border-brutal border-white">{item.type}</div>
                                </div>
                                <div className="flex justify-between items-end mt-auto pt-6 border-t-2 border-black">
                                    <div>
                                        <h3 className="text-3xl md:text-5xl font-display uppercase tracking-tight mb-1">{item.title}</h3>
                                        <p className="text-xl md:text-2xl font-bold font-sans text-[#0033FF]">{item.price}</p>
                                    </div>
                                    <button onClick={() => setCartCount(c => c + 1)} className="bg-black text-white w-14 h-14 flex items-center justify-center hover:bg-[#0033FF] transition-colors shrink-0 border-brutal border-black">
                                        <span className="text-3xl font-bold font-sans leading-none mb-1">+</span>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // Раздел "О нас" / Манифест
            const About = () => (
                <div className="pt-16 md:pt-20 w-full min-h-screen bg-black text-white pb-32">
                    <div className="px-6 md:px-12 py-20 md:py-32 border-b border-white/20">
                        <h2 className="text-[12vw] font-display uppercase tracking-tight leading-[0.8] mb-12 text-[#CCFF00]">
                            МАНИФЕСТ<br/>OBLIQUE
                        </h2>
                        <div className="max-w-4xl font-serif italic text-2xl md:text-4xl lg:text-5xl leading-snug mb-16">
                            "Мы приоткрываем пласт казахстанского андеграунда, чтобы показать вам то, что остается незамеченным, даже находясь прямо перед глазами."
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12 font-sans text-sm md:text-base leading-relaxed opacity-80 uppercase font-medium max-w-5xl text-justify">
                            <p>Дорогой читатель! Этот журнал разрабатывался в качестве дипломного проекта. Тем не менее, мы четко понимаем его цель и задачу. Наша родина бескрайняя и многослойная. Алматы — это не просто город, это живой организм, который мы препарируем на страницах нашего издания.</p>
                            <p>OBLIQUE — это не про тренды. Это про сырую, честную культуру. Про тех, кто шатает этот бетон, кто создает звук в подвалах, кто готовит стритфуд, ставший культом. Мы — зеркало, смещающее фокус.</p>
                        </div>
                    </div>
                    <div className="px-6 md:px-12 py-20">
                        <h3 className="text-3xl md:text-5xl font-display uppercase mb-12">Редакция</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 font-sans uppercase">
                            <div className="border border-white/20 p-8 hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">
                                <span className="text-[10px] font-bold tracking-widest opacity-50 mb-2 block">EDITOR-IN-CHIEF</span>
                                <span className="text-xl md:text-2xl font-bold">Эльвира Иванникова</span>
                            </div>
                            <div className="border border-white/20 p-8 hover:border-[#CCFF00] hover:text-[#CCFF00] transition-colors">
                                <span className="text-[10px] font-bold tracking-widest opacity-50 mb-2 block">ART DIRECTOR / DESIGN</span>
                                <span className="text-xl md:text-2xl font-bold">Ева Головинцева</span>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <div className="grain"></div>
                    <Navigation />

                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-[#0033FF] text-[#CCFF00] z-[100] p-8 flex flex-col">
                            <div className="flex justify-between items-center border-b-brutal border-[#CCFF00] pb-6">
                                <span className="text-4xl font-display uppercase tracking-wide">Oblique</span>
                                <button onClick={() => setIsMenuOpen(false)}><Icon name="X" size={40} /></button>
                            </div>
                            <div className="flex flex-col space-y-6 text-6xl md:text-8xl font-display uppercase tracking-tight mt-12">
                                <button onClick={() => {setCurrentPage('home'); setIsMenuOpen(false)}} className="text-left hover:text-white transition-colors">Главная</button>
                                <button onClick={() => {setCurrentPage('articles'); setIsMenuOpen(false)}} className="text-left hover:text-white transition-colors">Архив</button>
                                <button onClick={() => {setCurrentPage('shop'); setIsMenuOpen(false)}} className="text-left hover:text-white transition-colors">Магазин</button>
                                <button onClick={() => {setCurrentPage('about'); setIsMenuOpen(false)}} className="text-left hover:text-white transition-colors">Манифест</button>
                            </div>
                        </div>
                    )}

                    <div className="flex-grow">
                        {currentPage === 'home' && <Home />}
                        {currentPage === 'article' && <SingleArticle />}
                        {currentPage === 'articles' && <ArticlesArchive />}
                        {currentPage === 'shop' && <Shop />}
                        {currentPage === 'about' && <About />}
                    </div>

                    <footer className="w-full bg-white text-black py-16 md:py-24 px-6 md:px-12 border-t-brutal">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-end border-b-brutal pb-12 mb-12">
                            <h3 className="text-6xl md:text-9xl font-display uppercase tracking-tight leading-none mb-8 md:mb-0 hover:text-[#FF00FF] transition-colors cursor-pointer" onClick={() => window.scrollTo(0,0)}>OBLIQUE</h3>
                            <div className="flex gap-6">
                                <a href="#" className="hover:text-[#0033FF] transition-colors"><Icon name="Instagram" size={28} /></a>
                                <a href="#" className="hover:text-[#0033FF] transition-colors"><Icon name="Facebook" size={28} /></a>
                            </div>
                        </div>
                        <div className="flex flex-col lg:flex-row justify-between text-[10px] font-bold font-sans uppercase opacity-80 tracking-widest gap-6">
                            <p>© 2026 OBLIQUE MAGAZINE. ALMATY, KZ.</p>
                            <div className="flex flex-wrap gap-6 md:gap-12">
                                <span>PRINT: ЭТИКА</span>
                                <span>DESIGN: ГОЛОВИНЦЕВА</span>
                                <span>EDIT: ИВАННИКОВА</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
